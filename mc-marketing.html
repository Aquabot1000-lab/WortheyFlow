<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Command Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
    <link rel="apple-touch-icon" sizes="192x192" href="favicon-192.png">
    <style>
        /* Design - Premium Dark Theme */
        :root {
            --background-start: #0a0f1a;
            --background-end: #111827;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --accent-blue: #3b82f6;
            --accent-wa: #00b4d8;
            --accent-oa: #7c3aed;
            --accent-pbc: #f43f5e;
            --text-color: #e0e0e0;
            --subtle-grid-color: #ffffff10;
            --danger-red: #f43f5e;
            --warning-yellow: #f59e0b;
            --success-green: #10b981;
            --info-blue: #3b82f6;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--background-start), var(--background-end));
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            overflow-x: hidden; /* Prevent horizontal scroll */
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 0;
        }

        /* Glassmorphism Card */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        /* Accents */
        .accent-blue { color: var(--accent-blue); }
        .accent-wa { color: var(--accent-wa); }
        .accent-oa { color: var(--accent-oa); }
        .accent-pbc { color: var(--accent-pbc); }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--card-border);
        }

        .header h1 {
            background: linear-gradient(90deg, var(--accent-wa), var(--accent-oa));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5em;
            margin: 0;
            font-weight: 700;
        }

        .header-right {
            display: flex;
            align-items: center;
        }

        .live-status {
            display: flex;
            align-items: center;
            margin-right: 30px;
        }

        .pulse {
            width: 12px;
            height: 12px;
            background-color: var(--success-green);
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 1.5s infinite ease-in-out;
        }

        .last-updated {
            font-size: 0.9em;
            opacity: 0.8;
        }

        .filters, .date-ranges {
            display: flex;
            gap: 10px;
        }

        .filter-pill, .date-range-pill {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85em;
            transition: background 0.2s ease;
        }

        .filter-pill:hover, .date-range-pill:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .filter-pill.active, .date-range-pill.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
        }

        /* KPI Cards */
        .kpi-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .kpi-card .value {
            font-size: 2.5em;
            font-weight: 700;
            margin: 10px 0;
        }

        .kpi-card .label {
            font-size: 0.9em;
            opacity: 0.7;
            margin-bottom: 10px;
        }

        .kpi-card .change {
            font-size: 0.85em;
        }

        .kpi-card .change.positive {
            color: var(--success-green);
        }

        .kpi-card .change.negative {
            color: var(--danger-red);
        }

        /* Sparklines */
        .sparkline {
            width: 100%;
            height: 50px;
            display: block;
            margin-top: 10px;
        }

        /* Company Cards */
        .company-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .company-card {
            position: relative;
            overflow: hidden; /* Ensure glow stays within bounds */
        }

        .company-card-glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.7;
            filter: blur(30px);
            z-index: 1;
        }

        .company-card-content {
            position: relative;
            z-index: 2;
            padding: 15px; /* Slightly less padding to make space for glow */
        }

        .company-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .company-card-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            font-size: 0.9em;
        }

        .metric-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .metric-item .value {
            font-weight: 600;
            font-size: 1.2em;
        }

        .metric-item .label {
            opacity: 0.7;
            font-size: 0.8em;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.8em;
            font-weight: 500;
        }
        .status-badge.on-track { background-color: var(--success-green); color: var(--background-start); }
        .status-badge.watch { background-color: var(--warning-yellow); color: var(--background-start); }
        .status-badge.alert { background-color: var(--danger-red); color: var(--text-color); }

        .trend {
            font-size: 0.8em;
        }
        .trend.positive { color: var(--success-green); }
        .trend.negative { color: var(--danger-red); }

        /* Channel Table */
        .channel-table-container {
            margin-bottom: 30px;
            overflow-x: auto; /* For small screens */
        }

        .channel-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 15px; /* Spacing between rows */
        }

        .channel-table th, .channel-table td {
            padding: 15px 20px;
            text-align: left;
        }

        .channel-table thead th {
            background: var(--card-bg);
            border-bottom: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .channel-table tbody tr {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            transition: background 0.2s ease;
        }

        .channel-table tbody tr:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .channel-table th {
            font-weight: 600;
            opacity: 0.8;
            cursor: pointer; /* For sorting */
        }

        .channel-table td {
            font-size: 0.9em;
        }

        .cpl-cell.low { color: var(--success-green); }
        .cpl-cell.medium { color: var(--warning-yellow); }
        .cpl-cell.high { color: var(--danger-red); }

        /* Charts Grid */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-container {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 350px; /* Ensure charts have some height */
        }

        .chart-container h3 {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 1.2em;
            text-align: center;
        }

        .chart-container canvas {
            width: 100% !important; /* Chart.js might override */
            height: auto !important;
        }

        /* Doughnut chart center text */
        .chart-container .doughnut-center-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-size: 1.1em;
            font-weight: 600;
            opacity: 0.8;
        }

        /* Recent Leads Feed */
        .leads-feed {
            margin-bottom: 30px;
        }

        .leads-feed-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .leads-feed-header h3 {
            margin: 0;
            font-size: 1.3em;
        }

        .leads-list {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 0; /* Remove padding, list items have it */
            max-height: 400px;
            overflow-y: auto;
        }

        .lead-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid var(--card-border);
            transition: background 0.2s ease;
        }

        .lead-item:last-child {
            border-bottom: none;
        }

        .lead-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .lead-avatar {
            width: 40px;
            height: 40px;
            background-color: var(--accent-blue); /* Default */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9em;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .lead-info {
            flex-grow: 1;
        }

        .lead-name {
            font-weight: 600;
            margin-bottom: 3px;
        }

        .lead-details {
            font-size: 0.85em;
            opacity: 0.7;
        }

        .lead-source-badge {
            background: rgba(255, 255, 255, 0.15);
            padding: 3px 8px;
            border-radius: 5px;
            margin-left: 10px;
            font-size: 0.8em;
            flex-shrink: 0;
        }

        .lead-cpl {
            font-weight: 600;
            margin-left: 15px;
            flex-shrink: 0;
        }

        /* Alerts Panel */
        .alerts-panel {
            margin-bottom: 30px;
        }

        .alerts-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .alerts-panel-header h3 {
            margin: 0;
            font-size: 1.3em;
        }

        .alert-list {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 0;
            max-height: 300px;
            overflow-y: auto;
        }

        .alert-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid var(--card-border);
            font-size: 0.9em;
        }

        .alert-item:last-child {
            border-bottom: none;
        }

        .alert-icon {
            margin-right: 12px;
            font-size: 1.2em;
        }
        .alert-icon.warning { color: var(--warning-yellow); }
        .alert-icon.success { color: var(--success-green); }
        .alert-icon.info { color: var(--info-blue); }
        .alert-icon.danger { color: var(--danger-red); }

        .alert-message {
            flex-grow: 1;
            margin-right: 15px;
        }

        .alert-time {
            opacity: 0.6;
            font-size: 0.8em;
            white-space: nowrap;
        }

        .dismiss-button {
            background: none;
            border: none;
            color: var(--text-color);
            cursor: pointer;
            margin-left: 15px;
            font-size: 1em;
            opacity: 0.7;
            transition: opacity 0.2s ease;
        }

        .dismiss-button:hover {
            opacity: 1;
        }

        /* Animations */
        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(0.9); opacity: 1; }
        }

        .fade-in {
            opacity: 0;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Responsive adjustments */
        @media (max-width: 1200px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
            .company-cards, .kpi-cards {
                grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            .header h1 {
                font-size: 1.8em;
                margin-bottom: 15px;
            }
            .header-right {
                flex-direction: column;
                align-items: flex-start;
                width: 100%;
            }
            .live-status, .filters, .date-ranges {
                margin-bottom: 10px;
                width: 100%;
                justify-content: space-between;
            }
            .filter-pill, .date-range-pill {
                font-size: 0.75em;
                padding: 5px 10px;
            }
            .lead-item, .alert-item {
                flex-wrap: wrap;
            }
            .lead-info, .alert-message {
                width: 100%;
                margin-bottom: 5px;
            }
            .lead-source-badge, .lead-cpl, .alert-time, .dismiss-button {
                margin-left: 0;
                margin-top: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 1. Header -->
        <header class="header">
            <h1 class="fade-in">Marketing Command Center</h1>
            <div class="header-right fade-in">
                <div class="live-status">
                    <div class="pulse"></div>
                    <span class="last-updated">Last updated <span id="last-updated-time">--</span> min ago</span>
                </div>
                <div class="filters">
                    <span class="filter-pill active" data-filter="all">All</span>
                    <span class="filter-pill" data-filter="WA">WA</span>
                    <span class="filter-pill" data-filter="OA">OA</span>
                    <span class="filter-pill" data-filter="PBC">PBC</span>
                </div>
                <div class="date-ranges">
                    <span class="date-range-pill" data-range="today">Today</span>
                    <span class="date-range-pill active" data-range="7d">7D</span>
                    <span class="date-range-pill" data-range="30d">30D</span>
                </div>
            </div>
        </header>

        <!-- 2. KPI Cards -->
        <div class="kpi-cards" id="kpi-cards">
            <!-- KPI cards will be generated here -->
        </div>

        <!-- 3. Company Cards -->
        <div class="company-cards" id="company-cards">
            <!-- Company cards will be generated here -->
        </div>

        <!-- 4. Channel Table -->
        <div class="channel-table-container fade-in">
            <h3>Channel Performance</h3>
            <table class="channel-table">
                <thead>
                    <tr>
                        <th data-sort="channel">Channel</th>
                        <th data-sort="company">Company</th>
                        <th data-sort="spend" class="numeric">Spend</th>
                        <th data-sort="impressions" class="numeric">Impressions</th>
                        <th data-sort="clicks" class="numeric">Clicks</th>
                        <th data-sort="ctr" class="numeric">CTR</th>
                        <th data-sort="leads" class="numeric">Leads</th>
                        <th data-sort="cpl" class="numeric">CPL</th>
                        <th data-sort="status">Status</th>
                    </tr>
                </thead>
                <tbody id="channel-table-body">
                    <!-- Channel table rows will be generated here -->
                </tbody>
            </table>
        </div>

        <!-- 5. Charts -->
        <div class="charts-grid">
            <div class="chart-container fade-in">
                <h3>CPL Trend (30 Days)</h3>
                <canvas id="cplTrendChart"></canvas>
            </div>
            <div class="chart-container fade-in">
                <h3>Leads by Channel</h3>
                <canvas id="leadsByChannelChart"></canvas>
            </div>
            <div class="chart-container fade-in" style="position: relative;">
                <h3>Spend Allocation</h3>
                <canvas id="spendAllocationChart"></canvas>
                <div class="doughnut-center-text">Total Spend<br/><span id="doughnut-center-spend">$0</span></div>
            </div>
            <div class="chart-container fade-in">
                <h3>Daily Spend vs Budget</h3>
                <canvas id="dailySpendBudgetChart"></canvas>
            </div>
        </div>

        <!-- 6. Recent Leads Feed -->
        <div class="leads-feed fade-in">
            <div class="leads-feed-header">
                <h3>Recent Leads</h3>
                <span class="date-range-pill" data-range="all">View All</span>
            </div>
            <div class="leads-list" id="recent-leads-list">
                <!-- Recent leads will be generated here -->
            </div>
        </div>

        <!-- 7. Alerts Panel -->
        <div class="alerts-panel fade-in">
            <div class="alerts-panel-header">
                <h3>Alerts</h3>
            </div>
            <div class="alert-list" id="alerts-list">
                <!-- Alerts will be generated here -->
            </div>
        </div>
    </div>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <!-- Chart.js Doughnut Label Plugin (optional, for center text) -->
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-doughnutlabel@0.4.1/dist/chartjs-plugin-doughnutlabel.min.js"></script>
    <!-- Sparkline/SVG - we'll generate this inline -->

    <script>
        // Embedded DEMO_DATA (with dynamic generation for trends/leads)
        const DEMO_DATA = {
            kpis: {
                totalSpend: 2850, totalLeads: 68, blendedCPL: 41.91, budgetUsedPct: 63,
                sparklines: { spend: [80,95,110,88,105,120,98], leads: [2,3,4,2,5,3,4], cpl: [45,42,38,44,40,39,42] },
                changes: { spend: 12.5, leads: 18.2, cpl: -8.3 }
            },
            companies: {
                "Worthey Aquatics": { color: "#00b4d8", spend: 1200, leads: 15, cpl: 80, ctr: 3.2, conversions: 12, roas: 4.2, campaigns: 3, status: "watch", change: 15.3, channels: { "Google Search": 500, "Meta": 450, "LSA": 250 } },
                "OverAssessed": { color: "#7c3aed", spend: 1500, leads: 45, cpl: 33.33, ctr: 4.1, conversions: 38, roas: 6.8, campaigns: 5, status: "good", change: 22.1, channels: { "Meta TX": 600, "Meta GA": 450, "Meta WA": 450 } },
                "ProfitBlueprintCo": { color: "#f43f5e", spend: 150, leads: 8, cpl: 18.75, ctr: 2.8, conversions: 8, roas: 3.1, campaigns: 2, status: "good", change: 5.7, channels: { "Pinterest": 100, "Etsy": 50 } }
            },
            channels: [
                { channel: "Google Search", company: "Worthey Aquatics", spend: 500, impressions: 12500, clicks: 400, ctr: 3.2, leads: 5, cpl: 100, status: "watch" },
                { channel: "Meta Ads", company: "Worthey Aquatics", spend: 450, impressions: 28000, clicks: 840, ctr: 3.0, leads: 7, cpl: 64.29, status: "good" },
                { channel: "Google LSA", company: "Worthey Aquatics", spend: 250, impressions: 5000, clicks: 200, ctr: 4.0, leads: 3, cpl: 83.33, status: "watch" },
                { channel: "Meta TX", company: "OverAssessed", spend: 600, impressions: 35000, clicks: 1400, ctr: 4.0, leads: 20, cpl: 30, status: "good" },
                { channel: "Meta GA", company: "OverAssessed", spend: 450, impressions: 22000, clicks: 880, ctr: 4.0, leads: 13, cpl: 34.62, status: "good" },
                { channel: "Meta WA", company: "OverAssessed", spend: 450, impressions: 20000, clicks: 800, ctr: 4.0, leads: 12, cpl: 37.50, status: "good" },
                { channel: "Pinterest", company: "ProfitBlueprintCo", spend: 100, impressions: 45000, clicks: 900, ctr: 2.0, leads: 5, cpl: 20, status: "good" },
                { channel: "Etsy Ads", company: "ProfitBlueprintCo", spend: 50, impressions: 8000, clicks: 240, ctr: 3.0, leads: 3, cpl: 16.67, status: "good" }
            ],
            // Dynamically generated data will be added here
            dailyTrends: {},
            recentLeads: [],
            alerts: [
                { severity: "warning", message: "WA Google Search CPL ($100) approaching threshold ($100)", time: "2h ago" },
                { severity: "success", message: "OA Meta TX campaign hit record low CPL ($28) today", time: "5h ago" },
                { severity: "info", message: "PBC Pinterest impressions up 45% this week", time: "1d ago" }
            ]
        };

        // --- Utility Functions ---
        function getRandomNumber(min, max) {
            return Math.random() * (max - min) + min;
        }

        function generateDates(days) {
            const dates = [];
            const today = new Date(new Date().setUTCHours(0, 0, 0, 0)); // Start of today in UTC
            for (let i = 0; i < days; i++) {
                const date = new Date(today);
                // Decrement by (days - 1 - i) to get dates from oldest to newest
                date.setDate(today.getDate() - (days - 1 - i));
                dates.push(date.toISOString().split('T')[0]);
            }
            return dates;
        }

        function generateLeads(count, companiesData, sources) {
            const leads = [];
            const names = ["Maria Garcia", "James Wilson", "Sophia Lee", "Noah Kim", "Olivia Chen", "Liam Patel", "Emma Rodriguez", "Oliver Wang", "Ava Martinez", "Elijah Hernandez", "Mia Lopez", "William Davis", "Charlotte Miller", "Ethan Wilson", "Amelia Moore", "Alexander Taylor", "Harper Anderson", "Michael Thomas", "Evelyn Jackson", "Daniel White"];
            const timeAgoOptions = ["2h ago", "5h ago", "1d ago", "3h ago", "6h ago", "2d ago", "4h ago", "12h ago", "1d ago", "3d ago"];

            for (let i = 0; i < count; i++) {
                const companyName = companiesData[Math.floor(Math.random() * companiesData.length)];
                const company = Object.keys(DEMO_DATA.companies).find(c => c === companyName); // Find the actual company object
                const companyColor = company ? DEMO_DATA.companies[company].color : 'var(--accent-blue)'; // Fallback color

                // Generate a CPL that's somewhat related to the company's average CPL or a general range
                let cpl;
                if (company === "Worthey Aquatics") cpl = getRandomNumber(60, 120);
                else if (company === "OverAssessed") cpl = getRandomNumber(25, 45);
                else if (company === "ProfitBlueprintCo") cpl = getRandomNumber(12, 25);
                else cpl = getRandomNumber(20, 80); // General range

                leads.push({
                    name: names[Math.floor(Math.random() * names.length)],
                    source: sources[Math.floor(Math.random() * sources.length)],
                    company: company,
                    companyColor: companyColor,
                    cpl: cpl.toFixed(2),

        // --- Animation Functions ---
        function animateCounter(element, start, end, duration = 1500) {
            let startTime = null;
            const range = end - start;
            const format = element.classList.contains('currency') ? formatCurrency : formatPercentage;

            function step(timestamp) {
                if (!startTime) startTime = timestamp;
                const elapsed = timestamp - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const current = start + range * progress;
                element.textContent = format(current);

                if (progress < 1) {
                    requestAnimationFrame(step);
                } else {
                    element.textContent = format(end); // Ensure final value is exact
                }
            }
            requestAnimationFrame(step);
        }

        function animateSparkline(selector, data, color) {
            const elements = document.querySelectorAll(selector);
            elements.forEach((el, index) => {
                if (data[index] && data[index].length > 0) {
                    const svgNS = "http://www.w3.org/2000/svg";
                    const svg = document.createElementNS(svgNS, "svg");
                    svg.setAttribute("class", "sparkline");
                    svg.setAttribute("viewBox", "0 0 100 50"); // Aspect ratio adjusted

                    const points = data[index].map((value, i, arr) => {
                        // Scale value to fit within viewBox height, assuming min=0, max is dynamic or set
                        // For simplicity, let's assume data is somewhat normalized or find max
                        const maxValue = Math.max(...arr.map(Number));
                        const scaledValue = (value / maxValue) * 40; // Scale to 0-40 within 50 height
                        const x = (i / (arr.length - 1)) * 90 + 5; // Start at 5, end at 95 for padding
                        return `${x},${50 - scaledValue}`; // Y is inverted, 0 at bottom
                    }).join(" ");

                    const polyline = document.createElementNS(svgNS, "polyline");
                    polyline.setAttribute("points", points);
                    polyline.setAttribute("fill", "none");
                    polyline.setAttribute("stroke", color || "var(--accent-blue)");
                    polyline.setAttribute("stroke-width", "2");
                    svg.appendChild(polyline);
                    el.appendChild(svg);
                }
            });
        }

        // --- Table Sorting ---
        function applyTableSorting() {
            const table = document.querySelector('.channel-table');
            const headers = table.querySelectorAll('th[data-sort]');
            let currentSortColumn = null;
            let currentSortDirection = 'asc';

            headers.forEach(header => {
                header.addEventListener('click', () => {
                    const column = header.getAttribute('data-sort');
                    const isNumeric = header.classList.contains('numeric');

                    if (currentSortColumn === column) {
                        currentSortDirection = currentSortDirection === 'asc' ? 'desc' : 'asc';
                    } else {
                        currentSortColumn = column;
                        currentSortDirection = 'asc';
                    }

                    // Remove existing sort indicators
                    headers.forEach(h => h.removeAttribute('data-sort-dir'));
                    header.setAttribute('data-sort-dir', currentSortDirection);

                    // Sort data
                    const tbody = table.querySelector('tbody');
                    const rows = Array.from(tbody.querySelectorAll('tr'));

                    rows.sort((rowA, rowB) => {
                        const cellA = rowA.querySelector(`td[data-sort="${column}"]`) || rowA.cells[Array.from(rowA.cells).findIndex(cell => cell.textContent === header.textContent.trim())]; // Fallback by index
                        const cellB = rowB.querySelector(`td[data-sort="${column}"]`) || rowB.cells[Array.from(rowB.cells).findIndex(cell => cell.textContent === header.textContent.trim())];

                        let valA, valB;

                        if (isNumeric) {
                            valA = parseFloat(cellA.textContent.replace(/[$,%]/g, '').replace(/,/g, ''));
                            valB = parseFloat(cellB.textContent.replace(/[$,%]/g, '').replace(/,/g, ''));
                        } else {
                            valA = cellA.textContent.trim().toLowerCase();
                            valB = cellB.textContent.trim().toLowerCase();
                        }

                        if (valA < valB) return currentSortDirection === 'asc' ? -1 : 1;
                        if (valA > valB) return currentSortDirection === 'asc' ? 1 : -1;
                        return 0;
                    });

                    // Re-append sorted rows
                    rows.forEach(row => tbody.appendChild(row));
                });
            });
        }

        // --- Data Fetching and Refresh ---
        let currentData = DEMO_DATA; // Start with demo data
        let lastFetchTime = Date.now();
        const REFRESH_INTERVAL = 5 * 60 * 1000; // 5 minutes

        async function fetchData() {
            try {
                const token = localStorage.getItem('wf_token');
                const response = await fetch('/api/marketing/dashboard', {
                    headers: token ? { 'Authorization': `Bearer ${token}` } : {}
                });
                if (response.ok) {
                    const data = await response.json();
                    if (data && data.kpis && data.kpis.totalSpend !== undefined) {
                        console.log('Live data fetched successfully.');
                        return data;
                    }
                }
                console.warn('API returned empty/invalid, using DEMO_DATA.');
                return DEMO_DATA;
            } catch (error) {
                console.warn('API fetch failed, using DEMO_DATA:', error.message);
                return DEMO_DATA;
            }
        }

        function updateDashboard() {
            const now = Date.now();
            const minutesAgo = Math.floor((now - lastFetchTime) / 60000);
            document.getElementById('last-updated-time').textContent = minutesAgo;

            // Only fetch and re-render if the interval has passed
            if (now - lastFetchTime > REFRESH_INTERVAL) {
                fetchData().then(data => {
                    currentData = data;
                    renderDashboard(currentData);
                    lastFetchTime = now; // Reset timer only on successful data load
                }).catch(err => {
                    console.error("Error during updateDashboard sequence:", err);
                    // Ensure lastFetchTime is updated even on error to avoid hammering API
                    lastFetchTime = now;
                });
            }
        }

            renderKpiCards(data.kpis);
            renderCompanyCards(data.companies);
            renderChannelTable(data.channels);
            renderCharts(data);
            renderRecentLeads(data.recentLeads);
            renderAlerts(data.alerts);
            applyFadeIns(); // Apply animations after content is rendered
        }

        // --- Circular Progress Renderer ---
        function renderCircularProgress() {
            document.querySelectorAll('.circular-progress').forEach(element => {
                const value = parseFloat(element.getAttribute('data-value'));
                const color = element.getAttribute('data-color');
                const size = parseInt(element.getAttribute('data-size'), 10);
                const thickness = parseInt(element.getAttribute('data-thickness'), 10);

                // SVG representation for circular progress
                const radius = (size / 2) - (thickness / 2);
                const circumference = 2 * Math.PI * radius;
                const offset = circumference - (value / 100) * circumference;

                element.innerHTML = `
                    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="transform: rotate(-90deg);">
                        <circle cx="${size / 2}" cy="${size / 2}" r="${radius}" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="${thickness}"></circle>
                        <circle cx="${size / 2}" cy="${size / 2}" r="${radius}" fill="none" stroke="${color || 'var(--accent-blue)'}" stroke-width="${thickness}"
                                stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"
                                style="transition: stroke-dashoffset 1.5s ease-in-out;"></circle>
                    </svg>
                    <div class="kpi-card-center-text">
                        <span class="value currency">${formatCurrency(DEMO_DATA.kpis.totalSpend)}</span><br> <!-- Placeholder, will be animated -->
                        <span class="label">Budget Pacing</span>
                    </div>
                `;
                // Animate the circle's stroke offset
                const circle = element.querySelector('circle[stroke-dashoffset]');
                setTimeout(() => { // Small delay to allow SVG to render before animation
                    circle.style.strokeDashoffset = 0; // Animate to final position
                }, 100);

                // Animate the center text
                const centerValueElement = element.querySelector('.kpi-card-center-text .value');
                animateCounter(centerValueElement, 0, value, 1500);
            });
        }


        // --- Event Listeners ---
        function setupEventListeners() {
            // Filter pills
            document.querySelectorAll('.filter-pill').forEach(pill => {
                pill.addEventListener('click', () => {
                    document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
                    pill.classList.add('active');
                    filterTableByPill(pill.getAttribute('data-filter'));
                });
            });

            // Date range pills
            document.querySelectorAll('.date-range-pill').forEach(pill => {
                pill.addEventListener('click', () => {
                    document.querySelectorAll('.date-range-pill').forEach(p => p.classList.remove('active'));
                    pill.classList.add('active');
                    // In a real app, this would re-fetch data for the new range
                    console.log(`Date range set to: ${pill.getAttribute('data-range')}`);
                });
            });

            // Dismiss alert buttons (handled in renderAlerts)
        }

        function filterTableByPill(filter) {
            const tbody = document.getElementById('channel-table-body');
            const rows = tbody.querySelectorAll('tr');
            rows.forEach(row => {
                const companyCell = row.cells[1].querySelector('span'); // Company is inside a span
                const companyName = companyCell ? companyCell.textContent : '';

                if (filter === 'all' || companyName === filter) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });
        }

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            renderDashboard(currentData); // Initial render with demo data
            applyTableSorting(); // Apply sorting initially
            setupEventListeners(); // Setup interactive elements
            applyFadeIns(); // Apply fade-in animations

            // Start interval for dashboard updates
            setInterval(updateDashboard, 10000); // Check every 10 seconds, but only update data every REFRESH_INTERVAL
        });
    </script>
</body>
