<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Worthey Aquatics — Get Your Free Quote</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#1a2332 0%,#243044 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.card{background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.3);max-width:440px;width:100%;overflow:hidden}
.header{background:linear-gradient(135deg,#3b82f6,#1d4ed8);padding:28px 24px 24px;text-align:center;color:#fff}
.header img{width:80px;height:80px;border-radius:50%;background:#fff;padding:4px;margin-bottom:12px}
.header h1{font-size:22px;font-weight:700;margin-bottom:4px}
.header p{font-size:14px;opacity:.9}
.form-body{padding:24px}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;padding:12px 14px;border:2px solid #e5e7eb;border-radius:10px;font-size:16px;transition:border .2s;-webkit-appearance:none;appearance:none;background:#fff}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.field textarea{resize:vertical;min-height:70px}
.field .required{color:#ef4444}
.row{display:flex;gap:12px}
.row .field{flex:1}
.btn{display:block;width:100%;padding:14px;background:linear-gradient(135deg,#10b981,#059669);color:#fff;font-size:17px;font-weight:700;border:none;border-radius:12px;cursor:pointer;transition:transform .15s,box-shadow .15s;letter-spacing:.3px}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.6;cursor:not-allowed}
.success{text-align:center;padding:48px 24px}
.success .check{font-size:64px;margin-bottom:16px}
.success h2{font-size:22px;color:#10b981;margin-bottom:8px}
.success p{color:#6b7280;font-size:15px;line-height:1.5}
.error-msg{color:#ef4444;font-size:13px;margin-top:4px;display:none}
.badge{display:inline-block;background:rgba(255,255,255,.2);padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;margin-top:8px}
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <h1>🏊 Worthey Aquatics</h1>
    <p>Get Your Free Pool Quote</p>
    <span class="badge">📍 Kerrville Show 2026</span>
  </div>

  <div class="form-body" id="formArea">
    <form id="boothForm" novalidate>
      <div class="row">
        <div class="field">
          <label>First Name <span class="required">*</span></label>
          <input type="text" id="firstName" required autocomplete="given-name" placeholder="John">
        </div>
        <div class="field">
          <label>Last Name <span class="required">*</span></label>
          <input type="text" id="lastName" required autocomplete="family-name" placeholder="Smith">
        </div>
      </div>

      <div class="field">
        <label>Phone <span class="required">*</span></label>
        <input type="tel" id="phone" required autocomplete="tel" placeholder="(210) 555-1234" inputmode="tel">
        <div class="error-msg" id="phoneError">Please enter a valid phone number</div>
      </div>

      <div class="field">
        <label>Email</label>
        <input type="email" id="email" autocomplete="email" placeholder="john@email.com" inputmode="email">
      </div>

      <div class="field">
        <label>I'm Interested In <span class="required">*</span></label>
        <select id="jobType" required>
          <option value="">Choose one...</option>
          <option value="Pool Construction">New Pool Construction</option>
          <option value="Pool Remodel">Pool Remodel / Renovation</option>
          <option value="Service">Pool Service & Maintenance</option>
          <option value="Equipment">Repairs & Equipment Upgrades</option>
          <option value="Commercial">Commercial Pool</option>
          <option value="Other">Other / Just Looking</option>
        </select>
      </div>

      <div class="field">
        <label>City / Area</label>
        <input type="text" id="city" placeholder="Kerrville, Boerne, SA...">
      </div>

      <div class="field">
        <label>Anything else we should know?</label>
        <textarea id="notes" placeholder="Budget, timeline, backyard size..."></textarea>
      </div>

      <button type="submit" class="btn" id="submitBtn">Get My Free Quote →</button>
    </form>
  </div>

  <div class="success" id="successArea" style="display:none">
    <div class="check">✅</div>
    <h2>You're All Set!</h2>
    <p>A Worthey Aquatics team member will reach out soon. Enjoy the show!</p>
    <p style="margin-top:16px;font-size:13px;color:#9ca3af">📞 Questions? Call <a href="tel:2107607236" style="color:#3b82f6">(210) 760-7236</a></p>
  </div>
</div>

<script>
const API = window.location.origin;
const form = document.getElementById('boothForm');
const btn = document.getElementById('submitBtn');

function formatPhone(v) {
  const d = v.replace(/\D/g,'');
  if (d.length <= 3) return d;
  if (d.length <= 6) return '(' + d.slice(0,3) + ') ' + d.slice(3);
  return '(' + d.slice(0,3) + ') ' + d.slice(3,6) + '-' + d.slice(6,10);
}

document.getElementById('phone').addEventListener('input', function(e) {
  const pos = e.target.selectionStart;
  e.target.value = formatPhone(e.target.value);
});

form.addEventListener('submit', async function(e) {
  e.preventDefault();
  
  const firstName = document.getElementById('firstName').value.trim();
  const lastName = document.getElementById('lastName').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const email = document.getElementById('email').value.trim();
  const jobType = document.getElementById('jobType').value;
  const city = document.getElementById('city').value.trim();
  const notes = document.getElementById('notes').value.trim();

  // Validate
  const phoneDigits = phone.replace(/\D/g,'');
  if (!firstName || !lastName || phoneDigits.length < 10 || !jobType) {
    if (phoneDigits.length < 10 && phone.length > 0) {
      document.getElementById('phoneError').style.display = 'block';
    }
    // Highlight empty required fields
    ['firstName','lastName','phone','jobType'].forEach(id => {
      const el = document.getElementById(id);
      if (!el.value.trim()) el.style.borderColor = '#ef4444';
    });
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Submitting...';

  try {
    const res = await fetch(API + '/api/booth-lead', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        firstName, lastName, phone: phoneDigits, email,
        jobType, city, notes,
        source: 'Kerrville Show 2026'
      })
    });

    if (!res.ok) throw new Error('Server error');

    document.getElementById('formArea').style.display = 'none';
    document.getElementById('successArea').style.display = 'block';
  } catch (err) {
    btn.disabled = false;
    btn.textContent = 'Get My Free Quote →';
    alert('Something went wrong. Please try again or call us at (210) 760-7236.');
  }
});

// Clear error styling on focus
document.querySelectorAll('input, select').forEach(el => {
  el.addEventListener('focus', () => {
    el.style.borderColor = '';
    if (el.id === 'phone') document.getElementById('phoneError').style.display = 'none';
  });
});
</script>
</body>
</html>
