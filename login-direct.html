<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>WortheyFlow — Direct Login</title>
<style>body{font-family:Inter,sans-serif;background:#0f172a;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}
.card{background:#1e293b;padding:32px;border-radius:12px;width:340px;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
h2{margin:0 0 20px;text-align:center}input{width:100%;padding:12px;border:1px solid #334155;background:#0f172a;color:#fff;border-radius:8px;margin-bottom:12px;font-size:16px;box-sizing:border-box}
button{width:100%;padding:14px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer}
button:hover{background:#1d4ed8}.err{color:#ef4444;font-size:14px;margin-bottom:12px;display:none}.ok{color:#22c55e;font-size:14px;text-align:center;margin-top:12px}</style>
<script>
// Unregister ALL service workers first
if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(r=>{r.forEach(sw=>sw.unregister());console.log('Cleared',r.length,'service workers')})}
// Clear all caches
if('caches' in window){caches.keys().then(k=>{k.forEach(n=>caches.delete(n));console.log('Cleared',k.length,'caches')})}
function doLogin(){
var email=document.getElementById('e').value,pw=document.getElementById('p').value,err=document.getElementById('err');
err.style.display='none';
fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email,password:pw})})
.then(function(r){return r.json()}).then(function(d){
if(d.token){localStorage.setItem('wf_token',d.token);localStorage.setItem('wf_user',JSON.stringify(d.user));window.location.href='/?t='+Date.now()}
else{err.textContent=d.error||'Login failed';err.style.display='block'}
}).catch(function(e){err.textContent='Cannot reach server: '+e.message;err.style.display='block'});return false}
</script></head><body><div class="card"><h2>🏊 WortheyFlow Login</h2>
<div class="ok">✅ Service worker cleared. Cache cleared.</div>
<form onsubmit="return doLogin()"><input id="e" type="email" placeholder="Email" value="tyler@wortheyaquatics.com" required>
<input id="p" type="password" placeholder="Password" required><div id="err" class="err"></div>
<button type="submit">Sign In</button></form></div></body></html>
